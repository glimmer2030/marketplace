name: Sync skills/ from plugins/

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**/skills/**'
      - 'plugins/**/scripts/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate skills/ directory
        run: |
          rm -rf skills
          mkdir -p skills

          # For each plugin, copy its skills and co-located scripts
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")

            # Copy each skill directory
            if [ -d "$plugin_dir/skills" ]; then
              for skill_dir in "$plugin_dir"/skills/*/; do
                [ -d "$skill_dir" ] || continue
                skill_name=$(basename "$skill_dir")
                mkdir -p "skills/$skill_name"
                cp "$skill_dir/SKILL.md" "skills/$skill_name/SKILL.md"

                # Copy references/ if exists
                if [ -d "$skill_dir/references" ]; then
                  cp -r "$skill_dir/references" "skills/$skill_name/references"
                fi
              done
            fi

            # Copy scripts into skills that reference them
            # Check each SKILL.md for script references
            if [ -d "$plugin_dir/scripts" ] && [ -d "$plugin_dir/skills" ]; then
              for skill_dir in "$plugin_dir"/skills/*/; do
                [ -d "$skill_dir" ] || continue
                skill_name=$(basename "$skill_dir")
                skill_md="skills/$skill_name/SKILL.md"

                if [ -f "$skill_md" ] && grep -q "generate_pptx.py\|scripts/" "$skill_md"; then
                  mkdir -p "skills/$skill_name/scripts"
                  # Copy Python scripts (exclude hook-only scripts)
                  for script in "$plugin_dir"/scripts/*.py; do
                    [ -f "$script" ] || continue
                    script_name=$(basename "$script")
                    # Skip hook-only scripts
                    case "$script_name" in
                      log_session.py|log_session_wrapper.sh) continue ;;
                    esac
                    cp "$script" "skills/$skill_name/scripts/"
                  done
                fi
              done
            fi
          done

          echo "Generated skills/ directory:"
          find skills -type f | sort

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync skills/ from plugins/"
            git push
          fi
